name: Hourly News Scraper

on:
  schedule:
    # Runs at the start of every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install All Dependencies
        run: |
          npm ci
          cd automation && npm ci
          cd ../frontend && npm ci

      - name: Run Scraper and Deploy Prerendered Site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # 1. Scrape latest news articles
          npm run scraper
          
          # 2. Prerender articles, build client, and deploy hosting to Firebase
          npm run deploy
